<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز الحكيم للدراسات والسياسات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>مركز الحكيم للدراسات والسياسات</h1>
    <p>منصة بحثية لتحليل القضايا السياسية والاستراتيجية</p>
</header>

<nav>
    <button onclick="loadArticles()">📚 المقالات</button>
    <button onclick="showAddForm()">➕ إضافة مقال</button>
</nav>

<section id="articles"></section>

<section id="addForm" style="display:none;">
    <h2>إضافة مقال جديد</h2>

    <input type="text" id="title" placeholder="عنوان المقال">

    <textarea id="content" placeholder="محتوى المقال"></textarea>

    <button onclick="addArticle()">نشر المقال</button>
</section>

<script src="script.js"></script>

</body>
</html>
